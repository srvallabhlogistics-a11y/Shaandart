<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Welcome Screen */

    #welcomeScreen {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #welcomeScreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Video Screen */

    #videoScreen {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    #introVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <!-- Welcome Image -->

  <div id="welcomeScreen">
    <img src="welcome.jpg" alt="SHAANDART">
  </div>

  <!-- Video -->

  <div id="videoScreen">
    <video id="introVideo" autoplay muted playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <script>

    // Show video after 5 seconds

    setTimeout(() => {

      document.getElementById("welcomeScreen").style.display = "none";
      document.getElementById("videoScreen").style.display = "flex";

      const video = document.getElementById("introVideo");

      video.play();

      // Redirect after video ends

      video.onended = () => {
        window.location.href = "https://playexch9.com/sport/allgame/Games";
      };

    }, 5000);

  </script>

</body>

</html>
