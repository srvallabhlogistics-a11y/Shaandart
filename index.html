<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    /* Welcome Screen */

    #welcomeScreen{
      position:fixed;
      width:100%;
      height:100vh;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:10;
    }

    #welcomeScreen img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Video Screen */

    #videoScreen{
      position:fixed;
      width:100%;
      height:100vh;
      background:black;
      display:none;
      justify-content:center;
      align-items:center;
    }

    #introVideo{
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
    }

  </style>
</head>

<body>

  <!-- Welcome Image -->

  <div id="welcomeScreen">
    <img src="welcome.jpg" alt="Welcome">
  </div>

  <!-- Video Screen -->

  <div id="videoScreen">

    <video id="introVideo" controls playsinline>
      <source src="video.mp4" type="video/mp4">
      Your browser does not support video.
    </video>

  </div>

  <script>

    // Wait 5 seconds

    setTimeout(() => {

      // Hide image

      document.getElementById("welcomeScreen").style.display = "none";

      // Show video

      document.getElementById("videoScreen").style.display = "flex";

      // Play video

      const video = document.getElementById("introVideo");

      video.play();

      // Redirect after video ends

      video.onended = function () {

        window.location.href =
          "https://playexch9.com/sport/allgame/Games";

      };

    }, 5000);

  </script>

</body>

</html>
