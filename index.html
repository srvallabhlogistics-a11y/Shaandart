<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      font-family:Arial,sans-serif;
    }

    /* Welcome Screen */

    #welcomeScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
      z-index:10;
    }

    #welcomeScreen img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Flashing Text */

    #flashText{
      position:fixed;
      top:100px;
      width:100%;
      text-align:center;

      color:#b8860b;

      font-size:22px;
      font-weight:bold;

      z-index:40;

      animation:flash 1s infinite;

      text-shadow:0 0 12px rgba(184,134,11,0.9);

      transition:top 0.5s ease;
    }

    @keyframes flash{
      0%{opacity:1;}
      50%{opacity:0.2;}
      100%{opacity:1;}
    }

    /* Video Screen */

    #videoScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:none;
      justify-content:center;
      align-items:center;
      background:black;
      z-index:5;
    }

    #introVideo{
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
    }

    /* Play Button */

    #playButton{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      z-index:60;

      padding:18px 40px;
      font-size:18px;
      font-weight:bold;

      border:none;
      border-radius:50px;

      background:#ffcc00;
      color:black;

      cursor:pointer;

      display:none;

      box-shadow:0 0 25px rgba(255,204,0,0.8);
    }

    #playButton:hover{
      transform:translate(-50%, -50%) scale(1.05);
    }

    /* Skip Button */

    #skipButton{
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      z-index:60;

      padding:14px 28px;

      font-size:14px;
      font-weight:bold;

      border:none;
      border-radius:40px;

      background:white;
      color:black;

      cursor:pointer;

      display:none;

      box-shadow:0 0 15px rgba(255,255,255,0.5);
    }

    #skipButton:hover{
      transform:translateX(-50%) scale(1.05);
    }

  </style>
</head>

<body>

  <!-- Flashing Text -->

  <div id="flashText">
    One of the Trusted Exchange for Decades with 100% withdrawal processing records
  </div>

  <!-- Welcome Screen -->

  <div id="welcomeScreen">

    <img src="welcome.jpg" alt="Welcome">

  </div>

  <!-- Video Screen -->

  <div id="videoScreen">

    <video id="introVideo" playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>

  </div>

  <!-- Play Button -->

  <button id="playButton">
    ▶ Click to Know More
  </button>

  <!-- Skip Button -->

  <button id="skipButton">
    ➜ skip
  </button>

  <script>

    const video = document.getElementById("introVideo");
    const playButton = document.getElementById("playButton");
    const skipButton = document.getElementById("skipButton");
    const flashText = document.getElementById("flashText");

    // After 3 seconds

    setTimeout(() => {

  // Hide welcome image

  document.getElementById("welcomeScreen").style.display = "none";

  // Hide flashing text also

  document.getElementById("flashText").style.display = "none";

  // Show video screen

  document.getElementById("videoScreen").style.display = "flex";

  // Show buttons

  playButton.style.display = "block";
  skipButton.style.display = "block";

}, 5000);

    // Play video

    playButton.addEventListener("click", () => {

      // Hide flashing text

      flashText.style.display = "none";

      // Hide buttons

      playButton.style.display = "none";
      skipButton.style.display = "none";

      // Play video

      video.play();

    });

    // Skip directly

    skipButton.addEventListener("click", () => {

      window.location.href = "https://playexch9.com";

    });

    // Redirect after video ends

    video.onended = () => {

      window.location.href =
      "https://playexch9.com/sport/allgame/Games";

    };

  </script>

</body>

</html>
