<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      font-family:Arial,sans-serif;
    }

    /* Welcome Screen */

    #welcomeScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
      z-index:10;
    }

    #welcomeScreen img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Video Screen */

    #videoScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:none;
      justify-content:center;
      align-items:center;
      background:black;
    }

    #introVideo{
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
    }

    /* Play Button */

    #playButton{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      z-index:20;

      padding:18px 40px;
      font-size:24px;
      font-weight:bold;

      border:none;
      border-radius:50px;

      background:#ffcc00;
      color:black;

      cursor:pointer;

      display:none;

      box-shadow:0 0 25px rgba(255,204,0,0.8);
    }

    #playButton:hover{
      transform:translate(-50%, -50%) scale(1.05);
    }

  </style>
</head>

<body>

  <!-- Welcome Image -->

  <div id="welcomeScreen">
    <img src="welcome.jpg" alt="Welcome">
  </div>

  <!-- Video -->

  <div id="videoScreen">

    <video id="introVideo" playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>

  </div>

  <!-- Play Button -->

  <button id="playButton">
    ▶ PLAY VIDEO
  </button>

  <script>

    const video = document.getElementById("introVideo");
    const playButton = document.getElementById("playButton");

    // After 3 seconds

    setTimeout(() => {

      // Hide welcome image

      document.getElementById("welcomeScreen").style.display = "none";

      // Show video screen

      document.getElementById("videoScreen").style.display = "flex";

      // Show play button

      playButton.style.display = "block";

    }, 5000);

    // Play video with sound after button click

    playButton.addEventListener("click", () => {

      video.play();

      playButton.style.display = "none";

    });

    // Redirect after video ends

    video.onended = () => {

      window.location.href =
      "https://playexch9.com/sport/allgame/Games";

    };

  </script>

</body>

</html>
