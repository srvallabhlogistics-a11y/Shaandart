<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      font-family:Arial,sans-serif;
    }

    /* Welcome Image */

    #welcomeScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:black;
      z-index:10;
    }

    #welcomeScreen img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Video */

    #videoScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:none;
      justify-content:center;
      align-items:center;
      background:black;
    }

    #introVideo{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Tap Screen */

    #tapOverlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background:rgba(0,0,0,0.2);
      color:white;
      display:none;
      justify-content:center;
      align-items:center;
      font-size:30px;
      font-weight:bold;
      z-index:20;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <!-- Welcome -->

  <div id="welcomeScreen">
    <img src="welcome.jpg">
  </div>

  <!-- Video -->

  <div id="videoScreen">

    <video id="introVideo" autoplay playsinline muted>
      <source src="video.mp4" type="video/mp4">
    </video>

  </div>

  <!-- Tap Overlay -->

  <div id="tapOverlay">
    TAP ANYWHERE
  </div>

  <script>

    const video = document.getElementById("introVideo");

    // After 5 sec

    setTimeout(() => {

      document.getElementById("welcomeScreen").style.display = "none";

      document.getElementById("videoScreen").style.display = "flex";

      document.getElementById("tapOverlay").style.display = "flex";

      video.play();

    }, 5000);

    // User tap enables sound

    document.getElementById("tapOverlay").addEventListener("click", () => {

      video.muted = false;

      video.play();

      document.getElementById("tapOverlay").style.display = "none";

    });

    // Redirect after video ends

    video.onended = () => {

      window.location.href =
      "https://playexch9.com/sport/allgame/Games";

    };

  </script>

</body>

</html>
