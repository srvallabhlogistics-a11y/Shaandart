<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      font-family:Arial,sans-serif;
    }

    /* Welcome Screen */

    #welcomeScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      /* Golden Background */

      background:linear-gradient(
        135deg,
        #FFD700,
        #FFC300,
        #FFB000,
        #FFD700
      );

      z-index:10;
    }

    #welcomeScreen img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Video Screen */

    #videoScreen{
      position:fixed;
      width:100%;
      height:100vh;
      display:none;
      justify-content:center;
      align-items:center;
      background:black;
    }

    #introVideo{
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
    }

    /* Main Play Button */

    #playButton{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      z-index:20;

      padding:36px 80px;

      font-size:48px;
      font-weight:bold;

      border:none;
      border-radius:70px;

      background:#ffcc00;
      color:black;

      cursor:pointer;

      display:none;

      box-shadow:0 0 35px rgba(255,204,0,0.9);
    }

    #playButton:hover{
      transform:translate(-50%, -50%) scale(1.08);
    }

    /* Direct Visit Button */

    #skipButton{
      position:fixed;
      bottom:50px;
      left:50%;
      transform:translateX(-50%);
      z-index:20;

      padding:28px 60px;

      font-size:32px;
      font-weight:bold;

      border:none;
      border-radius:60px;

      background:white;
      color:black;

      cursor:pointer;

      display:none;

      box-shadow:0 0 25px rgba(255,255,255,0.7);
    }

    #skipButton:hover{
      transform:translateX(-50%) scale(1.08);
    }

  </style>
</head>

<body>

  <!-- Welcome Image -->

  <div id="welcomeScreen">
    <img src="welcome.jpg" alt="Welcome">
  </div>

  <!-- Video -->

  <div id="videoScreen">

    <video id="introVideo" playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>

  </div>

  <!-- Play Video Button -->

  <button id="playButton">
    ▶ CLICK TO KNOW MORE
  </button>

  <!-- Skip Video Button -->

  <button id="skipButton">
    ➜ CLICK HERE TO VISIT WEBSITE DIRECTLY
  </button>

  <script>

    const video = document.getElementById("introVideo");
    const playButton = document.getElementById("playButton");
    const skipButton = document.getElementById("skipButton");

    // After 3 seconds

    setTimeout(() => {

      // Hide welcome image

      document.getElementById("welcomeScreen").style.display = "none";

      // Show video screen

      document.getElementById("videoScreen").style.display = "flex";

      // Show buttons

      playButton.style.display = "block";
      skipButton.style.display = "block";

    }, 5000);

    // Play video

    playButton.addEventListener("click", () => {

      video.play();

      playButton.style.display = "none";
      skipButton.style.display = "none";

    });

    // Skip directly to website

    skipButton.addEventListener("click", () => {

      window.location.href = "https://playexch9.com";

    });

    // Redirect after video ends

    video.onended = () => {

      window.location.href =
      "https://playexch9.com/sport/allgame/Games";

    };

  </script>

</body>

</html>
