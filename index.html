<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAANDART</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
    }

    #welcome{
      position:fixed;
      width:100%;
      height:100vh;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #welcome img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    #videoPage{
      display:none;
      width:100%;
      height:100vh;
      background:black;
    }

    #videoPage video{
      width:100%;
      height:100%;
      object-fit:cover;
    }
  </style>
</head>

<body>

  <!-- Welcome Image -->
  <div id="welcome">
    <img src="welcome.jpg">
  </div>

  <!-- Video -->
  <div id="videoPage">
    <video id="introVideo" autoplay muted playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <script>

    setTimeout(function(){

      document.getElementById("welcome").style.display = "none";
      document.getElementById("videoPage").style.display = "block";

      let video = document.getElementById("introVideo");

      video.play();

      video.onended = function(){
        window.location.href = "https://playexch9.com/sport/allgame/Games";
      };

    }, 5000);

  </script>

</body>
</html>
